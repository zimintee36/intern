<!DOCTYPE html>
<html>

<head>

<title>Student Register</title>
<link rel="stylesheet" href="../style/take2-t.css" />

</head>

<body>


<h2>Student Registration</h2>
<ul id="RegisterList"></ul>
<form id="RegisterForm">
<input 
type="text"
name="student_id"
placeholder="Student ID"
required>

<br>

<input
type="text"
name="studentname"
placeholder="Student Name"
required>

<br>
<textarea
name="coursename"
placeholder="Course Name"
required></textarea>
<br>

<button type="submit">Submit</button>
</form>
<script>

const list =
document.getElementById("RegisterList");

const form =
document.getElementById("RegisterForm");

const REGISTER_API =
"http://localhost:5000/register";

// ======================
// READ
// ======================

function loadRegister(){

fetch(REGISTER_API)
.then(res=>res.json())
.then(data=>{
list.innerHTML="";
data.forEach(c=>{
let li =
document.createElement("li");

li.innerHTML = `
<b>Student ID:</b>
${c.student_id}
<br>

<b>Name:</b>
${c.studentname}
<br>

<b>Courses:</b>
${c.coursename}
<br>

<button onclick="editRegister('${c.student_id}')">Edit</button>
<button onclick="deleteRegister('${c.student_id}')">Delete</button><hr>`;
list.appendChild(li);

});
})

.catch(error=>{

    alert(
    "❌ Load Failed: "
    + error.message
    );

});

}

// ======================
// CREATE
// ======================

form.addEventListener(
"submit",
function(e){

e.preventDefault();

let formData =
new FormData(form);

let data =
Object.fromEntries(formData.entries());


if(
data.student_id=="" ||
data.studentname=="" ||
data.coursename==""
){
alert("❌ Please fill all fields");
return;
}

fetch(REGISTER_API,{
method:"POST",
headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(data)
})

.then(res=>res.json())
.then(data=>{
alert("✅ Register Success: " + data.message);
form.reset();
loadRegister();

})

.catch(error=>{


alert(
"❌ Register Failed: "
+ error.message
);


});


});

// ======================
// EDIT
// ======================

function editRegister(student_id) {

fetch(REGISTER_API)
.then(res=>{
if(!res.ok){
throw new Error("Cannot get data");
}
return res.json();})
.then(data=>{


let student = data.find(c => c.student_id == student_id);

if(!student){
alert("❌ Student not found");
return;
}


let li = document.querySelector(
`button[onclick="editRegister('${student_id}')"]`
).parentElement;


li.innerHTML = `
<b>Student ID:</b><br>
<input id="editID" value="${student.student_id}">
<br>

<b>Name:</b><br>
<input id="editName" value="${student.studentname}">
<br>

<b>Courses:</b><br>
<textarea id="editCourses">${student.coursename}</textarea>
<br>

<button onclick="saveRegister('${student_id}')">
Save
</button>

<button onclick="loadRegister()">
Cancel
</button>
<hr>
`;
})

.catch(error=>{
alert("❌ Edit Failed: "+error.message);
});
}


function saveRegister(oldID){

let newID =
document.getElementById("editID").value;

let name =
document.getElementById("editName").value;

let courses =
document.getElementById("editCourses").value;

if(
newID=="" ||
name=="" ||
courses==""
){
alert("❌ Cannot leave empty");
return;
}

fetch(REGISTER_API + "/" + oldID,{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
student_id:newID,
studentname:name,
coursename:courses
})
})

.then(res=>{
if(!res.ok){
throw new Error("Update failed");
}
return res.json();
})
.then(data=>{
alert("✅ Update Success: "+data.message);
loadRegister();
})

.catch(error=>{
alert("❌ Update Failed: "+error.message);
});

}
// ======================
// DELETE
// ======================

function deleteRegister(student_id){
if(!confirm("Are you sure you want to delete this student?"))
return;

fetch(
REGISTER_API+"/"+student_id,
{method:"DELETE"})
.then(res=>{
if(!res.ok){
throw new Error("Delete failed");
}
return res.json();
})

.then(data=>{
alert("✅ Delete Success: " + data.message);
loadRegister();
})

.catch(error=>{
alert("❌ Delete Failed: "+error.message);
});
}

// 页面打开自动读取

loadRegister();

</script>

</body>
</html>
